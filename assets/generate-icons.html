<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<script>
// This generates PNG icons from the SVG — open this file once in a browser to generate icons
const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0a0a0f"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14103a"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
  </defs>
  <polyline points="80,360 160,280 220,320 300,200 370,240 432,140"
    fill="none" stroke="url(#line)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="300" cy="200" r="16" fill="#00e676"/>
  <circle cx="432" cy="140" r="16" fill="#b388ff"/>
  <text x="256" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="72" font-weight="900" fill="#6c63ff">AI</text>
</svg>`;

[192, 512].forEach(size => {
  const img = new Image();
  const svg = new Blob([svgData], {type:'image/svg+xml'});
  const url = URL.createObjectURL(svg);
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    c.getContext('2d').drawImage(img, 0, 0, size, size);
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = `icon-${size}.png`;
    document.body.appendChild(a);
    a.textContent = `Download icon-${size}.png`;
    a.style = 'display:block;margin:10px;';
    URL.revokeObjectURL(url);
  };
  img.src = url;
});
</script>
<p>Click the links below to download the icons (save them in the assets/ folder):</p>
</body>
</html>
